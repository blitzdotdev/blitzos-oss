<!doctype html>
<meta charset="utf-8" />
<title>Remix</title>
<!--
  Remix — bend any website to your will. A control surface for the connected agent: you type a site and
  what to change; the agent (BlitzOS supplies the loop, the agent supplies the intelligence) fetches the
  real page, redesigns it, and renders the result back into this widget's `view` prop. Sandboxed widgets
  have no network, so ALL data/generation happens agent-side and arrives via onProps.

  AGENT PROTOCOL  (widget → agent via blitz.sendMessage; agent → widget via update_surface{props})
    outgoing messages:  "remix open <url>"            open & redesign a site
                        "remix instant <directive>"  fast re-skin of the current view (ephemeral)
                        "remix smart <directive>"     durable rule the agent builds in the background
                        "remix act <ref>"             a click inside the rendered view (data-act ref)
                        "remix back"                  go to the previous view
                        "remix toggle <id>" / "remix remove <id>"   manage a durable remix
    incoming props:     { url, view (HTML fragment), status, busy, mode, remixes:[{id,name,enabled}] }
-->
<style>
  :root {
    --ink: var(--blitz-text, #1a1b1d);
    --dim: var(--blitz-text-dim, #797c7f);
    --line: var(--blitz-hairline, rgba(0, 0, 0, .10));
    --line-soft: rgba(0, 0, 0, .055);
    --surface: var(--blitz-surface, #fff);
    --surface-2: var(--blitz-surface-2, #f3f3f1);
    --accent: #5b5bd6;          /* the Remix signature — used sparingly */
    --accent-soft: rgba(91, 91, 214, .10);
    --smart: #7c5cff;
    --r: 11px; --r-sm: 8px;
    --font: var(--blitz-font, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body { margin: 0; background: var(--surface); color: var(--ink); font: 13px/1.5 var(--font); display: flex; flex-direction: column; overflow: hidden; -webkit-font-smoothing: antialiased; }

  /* ── top bar ── */
  .bar { flex: 0 0 auto; display: flex; align-items: center; gap: 7px; padding: 9px 11px; border-bottom: 1px solid var(--line); }
  .brand { display: flex; align-items: center; gap: 6px; font-weight: 700; font-size: 13px; letter-spacing: -.01em; padding-right: 3px; user-select: none; }
  .brand .glyph { width: 17px; height: 17px; border-radius: 5px; background: linear-gradient(135deg, var(--accent), var(--smart)); display: grid; place-items: center; }
  .brand .glyph::after { content: ""; width: 6px; height: 6px; border-radius: 1.5px; background: #fff; transform: rotate(45deg); }
  .icobtn { width: 30px; height: 30px; flex: 0 0 auto; border: 1px solid var(--line); background: var(--surface); border-radius: var(--r-sm); color: var(--dim); cursor: pointer; font-size: 15px; line-height: 1; display: grid; place-items: center; transition: background .12s, color .12s; }
  .icobtn:hover { background: var(--surface-2); color: var(--ink); }
  .icobtn:disabled { opacity: .4; cursor: default; }
  .url { flex: 1 1 auto; min-width: 0; display: flex; align-items: center; gap: 7px; background: var(--surface-2); border: 1px solid transparent; border-radius: 9999px; padding: 0 6px 0 13px; transition: border-color .12s, background .12s; }
  .url:focus-within { background: var(--surface); border-color: var(--accent); }
  .url .lock { color: var(--dim); font-size: 11px; flex: 0 0 auto; }
  .url input { flex: 1; min-width: 0; border: none; background: transparent; outline: none; font: 13px var(--font); color: var(--ink); padding: 8px 0; }
  .url input::placeholder { color: var(--dim); }
  .url .go { border: none; background: var(--ink); color: #fff; border-radius: 9999px; padding: 6px 14px; font: 600 12px var(--font); cursor: pointer; flex: 0 0 auto; }
  .url .go:active { transform: scale(.97); }

  /* ── active-remix shelf ── */
  .shelf { flex: 0 0 auto; display: flex; gap: 6px; flex-wrap: wrap; align-items: center; padding: 8px 12px; border-bottom: 1px solid var(--line-soft); }
  .shelf:empty { display: none; }
  .shelf .tag { font-size: 10px; letter-spacing: .05em; text-transform: uppercase; color: var(--dim); margin-right: 1px; font-weight: 600; }
  .chip { display: inline-flex; align-items: center; gap: 7px; background: var(--surface-2); border: 1px solid var(--line); border-radius: 9999px; padding: 4px 5px 4px 10px; font-size: 12px; color: var(--ink); }
  .chip .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); cursor: pointer; flex: 0 0 auto; box-shadow: 0 0 0 3px var(--accent-soft); }
  .chip.off { color: var(--dim); } .chip.off .dot { background: var(--dim); box-shadow: none; }
  .chip .x { cursor: pointer; color: var(--dim); width: 16px; height: 16px; border-radius: 50%; display: grid; place-items: center; font-size: 13px; }
  .chip .x:hover { background: var(--line); color: var(--ink); }
  .chip.job { background: var(--accent-soft); border-color: transparent; color: #4a3fc4; }
  .chip.job .spin { width: 10px; height: 10px; border: 2px solid rgba(91, 91, 214, .25); border-top-color: var(--accent); border-radius: 50%; animation: sp .7s linear infinite; }
  @keyframes sp { to { transform: rotate(360deg); } }

  /* ── status line ── */
  .status { flex: 0 0 auto; display: none; align-items: center; gap: 8px; padding: 7px 13px; font-size: 12px; color: var(--dim); border-bottom: 1px solid var(--line-soft); background: var(--surface-2); }
  .status.show { display: flex; }
  .status .pulse { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); flex: 0 0 auto; animation: pulse 1.1s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: .35; } 50% { opacity: 1; } }

  /* ── viewport (holds the rendered remix) ── */
  .viewport { flex: 1 1 auto; min-height: 0; overflow: auto; background: var(--surface); }
  .empty { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; text-align: center; padding: 40px; color: var(--dim); }
  .empty .big { width: 46px; height: 46px; border-radius: 13px; background: linear-gradient(135deg, var(--accent), var(--smart)); display: grid; place-items: center; box-shadow: 0 8px 24px rgba(91, 91, 214, .25); }
  .empty .big::after { content: ""; width: 15px; height: 15px; border-radius: 4px; background: #fff; transform: rotate(45deg); }
  .empty h2 { margin: 4px 0 0; font-size: 17px; font-weight: 700; color: var(--ink); letter-spacing: -.01em; }
  .empty p { margin: 0; max-width: 290px; line-height: 1.55; }
  .empty .exs { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; margin-top: 4px; }
  .empty .ex { background: var(--surface-2); border: 1px solid var(--line); border-radius: 8px; padding: 5px 11px; font-size: 12px; color: var(--ink); cursor: pointer; }
  .empty .ex:hover { border-color: var(--accent); color: var(--accent); }

  /* ── composer ── */
  .composer { flex: 0 0 auto; border-top: 1px solid var(--line); background: var(--surface); padding: 9px 11px 11px; }
  .modes { display: inline-flex; background: var(--surface-2); border-radius: 9px; padding: 3px; gap: 2px; margin-bottom: 8px; }
  .mode { border: none; background: transparent; border-radius: 7px; padding: 6px 13px; font: 600 12px var(--font); color: var(--dim); cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: color .12s; }
  .mode .d { width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: .5; }
  .mode.on { background: var(--surface); color: var(--ink); box-shadow: 0 1px 2px rgba(0,0,0,.08); }
  .mode.on[data-m="instant"] .d { background: var(--accent); opacity: 1; }
  .mode.on[data-m="smart"] .d { background: var(--smart); opacity: 1; }
  .modehint { font-size: 11.5px; color: var(--dim); margin-left: 9px; }
  .cmdrow { display: flex; gap: 8px; }
  .cmd { flex: 1; border: 1px solid var(--line); background: var(--surface); border-radius: var(--r); padding: 10px 13px; font: 13px var(--font); color: var(--ink); outline: none; }
  .cmd:focus { border-color: var(--accent); }
  .cmd::placeholder { color: var(--dim); }
  .send { width: 40px; flex: 0 0 auto; border: none; border-radius: var(--r); background: var(--ink); color: #fff; font-size: 16px; cursor: pointer; }
  .send.smart { background: var(--smart); }
  .send:active { transform: scale(.96); }

  /* ── the rendered remix's base reader/feed design system (light, agent emits classes; can override) ── */
  .rmx { color: var(--ink); font: 14px/1.55 var(--font); }
  .rmx a { color: inherit; text-decoration: none; }
  .rmx .top { position: sticky; top: 0; z-index: 2; background: rgba(255,255,255,.82); backdrop-filter: blur(8px); padding: 14px 18px 10px; border-bottom: 1px solid var(--line-soft); }
  .rmx .top h1 { margin: 0; font-size: 19px; font-weight: 750; letter-spacing: -.02em; }
  .rmx .tabs { display: flex; gap: 4px; margin-top: 10px; }
  .rmx .tab { font-size: 13px; font-weight: 600; color: var(--dim); padding: 5px 11px; border-radius: 7px; cursor: pointer; }
  .rmx .tab.on { color: var(--ink); background: var(--surface-2); }
  .rmx .item { display: grid; grid-template-columns: 40px 1fr; gap: 12px; padding: 14px 18px; border-bottom: 1px solid var(--line-soft); cursor: pointer; }
  .rmx .item:hover { background: var(--surface-2); }
  .rmx .item.plain { grid-template-columns: 1fr; }
  .rmx .av { width: 40px; height: 40px; border-radius: 50%; display: grid; place-items: center; font-weight: 700; font-size: 15px; color: #fff; overflow: hidden; flex: 0 0 auto; background: hsl(var(--h, 240), 55%, 60%); }
  .rmx .av img { width: 100%; height: 100%; object-fit: cover; }
  .rmx .row { display: flex; align-items: baseline; gap: 6px; flex-wrap: wrap; }
  .rmx .nm { font-weight: 680; } .rmx .hl { color: var(--dim); font-weight: 400; font-size: 13px; } .rmx .tm { color: var(--dim); font-size: 13px; }
  .rmx .body { margin: 3px 0 0; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
  .rmx .media { margin-top: 9px; border: 1px solid var(--line); border-radius: 12px; overflow: hidden; } .rmx .media img { width: 100%; display: block; }
  .rmx .acts { display: flex; gap: 22px; margin-top: 9px; color: var(--dim); font-size: 12.5px; }
  .rmx .act { cursor: pointer; } .rmx .act:hover { color: var(--accent); }
  .rmx .article { max-width: 680px; margin: 0 auto; padding: 26px 26px 60px; }
  .rmx .article h1 { font-size: 30px; line-height: 1.12; letter-spacing: -.02em; margin: 0 0 14px; font-weight: 760; }
  .rmx .article h2 { font-size: 20px; margin: 28px 0 8px; letter-spacing: -.01em; }
  .rmx .article h3 { font-size: 16px; margin: 20px 0 6px; }
  .rmx .prose { font-size: 16px; line-height: 1.72; color: #2a2b2e; margin: 0 0 15px; }
  .rmx .article img { max-width: 100%; border-radius: 10px; margin: 16px 0; }
  .rmx .card { background: var(--surface-2); border: 1px solid var(--line-soft); border-radius: 14px; margin: 12px 18px; padding: 14px 16px; }
  .rmx .card h2 { margin: 0 0 8px; font-size: 15px; font-weight: 700; }
</style>

<div class="bar">
  <div class="brand"><span class="glyph"></span>Remix</div>
  <button class="icobtn" id="back" title="Back" disabled>‹</button>
  <div class="url"><span class="lock">●</span><input id="url" placeholder="open any website — news.ycombinator.com, en.wikipedia.org…" spellcheck="false" /><button class="go" id="go">Open</button></div>
</div>
<div class="shelf" id="shelf"></div>
<div class="status" id="status"></div>
<div class="viewport">
  <div class="rmx" id="view">
    <div class="empty">
      <div class="big"></div>
      <h2>Remix the web</h2>
      <p>Open any site, then tell Remix what to change. It rebuilds the real page — your way.</p>
      <div class="exs">
        <span class="ex" data-open="https://news.ycombinator.com">Hacker News</span>
        <span class="ex" data-open="https://en.wikipedia.org/wiki/Typography">Wikipedia</span>
        <span class="ex" data-open="https://lobste.rs">Lobsters</span>
      </div>
    </div>
  </div>
</div>
<div class="composer">
  <div class="modes">
    <button class="mode on" data-m="instant"><span class="d"></span>Instant</button>
    <button class="mode" data-m="smart"><span class="d"></span>Smart</button>
    <span class="modehint" id="modehint">Fast re-skin of the page you're viewing.</span>
  </div>
  <div class="cmdrow">
    <input class="cmd" id="cmd" placeholder="change anything — “make it minimal”, “mute: crypto, nft”…" spellcheck="false" />
    <button class="send" id="send" title="Send">↑</button>
  </div>
</div>

<script>
  (function () {
    var mode = 'instant', curUrl = '', hasView = false;
    var $ = function (id) { return document.getElementById(id); };
    var send = function (t) { try { window.blitz && window.blitz.sendMessage && window.blitz.sendMessage(t); } catch (e) {} };
    var HINT = { instant: "Fast re-skin of the page you're viewing.", smart: "A durable change the agent builds — it sticks every visit." };

    function setMode(m) {
      mode = m;
      [].forEach.call(document.querySelectorAll('.mode'), function (b) { b.classList.toggle('on', b.dataset.m === m); });
      $('modehint').textContent = HINT[m];
      $('cmd').placeholder = m === 'smart'
        ? "durable change — “permanently hide the AI bar”, “always mute: politics”…"
        : "change anything — “make it minimal”, “magazine layout”…";
      $('send').classList.toggle('smart', m === 'smart');
    }
    [].forEach.call(document.querySelectorAll('.mode'), function (b) { b.onclick = function () { setMode(b.dataset.m); }; });

    function open(u) { u = (u || '').trim(); if (!u) return; if (!/^https?:\/\//.test(u)) u = 'https://' + u.replace(/^\/+/, ''); setStatus('Opening ' + u.replace(/^https?:\/\//, '') + '…', true); send('remix open ' + u); }
    $('go').onclick = function () { open($('url').value); };
    $('url').addEventListener('keydown', function (e) { if (e.key === 'Enter') { e.preventDefault(); open(this.value); } });
    $('back').onclick = function () { send('remix back'); };

    function submit() { var t = $('cmd').value.trim(); if (!t) return; if (!hasView) { setStatus('Open a site first, then restyle it.', false); return; } $('cmd').value = ''; if (mode === 'smart') { setStatus('✦ Smart job sent — the agent is building a durable remix…', true); send('remix smart ' + t); } else { setStatus('Restyling: ' + t + '…', true); send('remix instant ' + t); } }
    $('send').onclick = submit;
    $('cmd').addEventListener('keydown', function (e) { if (e.key === 'Enter') { e.preventDefault(); submit(); } });

    function setStatus(s, busy) { var el = $('status'); if (s) { el.innerHTML = (busy ? '<span class="pulse"></span>' : '') + '<span></span>'; el.lastChild.textContent = s; el.classList.add('show'); } else { el.classList.remove('show'); } }

    function renderShelf(remixes, jobs) {
      var h = '', has = (remixes && remixes.length) || (jobs && jobs.length);
      if (has) h += '<span class="tag">Remixes</span>';
      (remixes || []).forEach(function (r) { h += '<span class="chip' + (r.enabled === false ? ' off' : '') + '"><span class="dot" data-toggle="' + r.id + '"></span>' + esc(r.name) + '<span class="x" data-remove="' + r.id + '">×</span></span>'; });
      (jobs || []).forEach(function (j) { h += '<span class="chip job">' + (j.status === 'done' ? '✓' : '<span class="spin"></span>') + ' ' + esc(j.intent).slice(0, 38) + '</span>'; });
      $('shelf').innerHTML = h;
    }
    function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]; }); }
    $('shelf').addEventListener('click', function (e) {
      var t = e.target.closest('[data-toggle]'); if (t) { send('remix toggle ' + t.getAttribute('data-toggle')); return; }
      var x = e.target.closest('[data-remove]'); if (x) { send('remix remove ' + x.getAttribute('data-remove')); }
    });

    // clicks inside the rendered remix → drive the real site (agent fetches the next page)
    $('view').addEventListener('click', function (e) {
      var el = e.target.closest('[data-act]'); if (!el) return;
      e.preventDefault();
      var op = el.getAttribute('data-open'); if (op) { open(op); return; }
      setStatus('Opening…', true); send('remix act ' + el.getAttribute('data-act'));
    });

    function apply(p) {
      if (!p) return;
      if (typeof p.mode === 'string' && p.mode !== mode) setMode(p.mode);
      if (typeof p.url === 'string') { curUrl = p.url; if (document.activeElement !== $('url')) $('url').value = p.url.replace(/^https?:\/\//, ''); $('back').disabled = !p.canBack; }
      if ('canBack' in p) $('back').disabled = !p.canBack;
      if (p.remixes || p.jobs) renderShelf(p.remixes || [], p.jobs || []);
      if (typeof p.view === 'string' && p.view) { $('view').innerHTML = p.view; hasView = true; }
      if ('status' in p) setStatus(p.status || '', !!p.busy);
    }
    if (window.blitz) { window.blitz.ready(apply); window.blitz.onProps(apply); }
  })();
</script>
